<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026 NCAA March Madness Bracket</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e6ff; min-height: 100vh; }

/* ‚îÄ‚îÄ Setup Screen ‚îÄ‚îÄ */
.setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.setup-card { background: #131929; border: 1px solid #1e2d4a; border-radius: 16px; padding: 40px; width: 100%; max-width: 520px; }
.setup-title { font-size: 2rem; font-weight: 800; text-align: center; background: linear-gradient(135deg, #ff6b00, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.setup-sub { text-align: center; color: #7a8aaa; font-size: 0.85rem; margin-bottom: 28px; }
.player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.player-num { width: 28px; height: 28px; border-radius: 50%; background: #1e2d4a; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #7a8aaa; flex-shrink: 0; }
.player-row.active .player-num { background: #ff6b00; color: #fff; }
.player-input { flex: 1; background: #0a0e1a; border: 1px solid #1e2d4a; border-radius: 8px; padding: 10px 14px; color: #e0e6ff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
.player-input:focus { border-color: #ff6b00; }
.player-input::placeholder { color: #3a4a6a; }
.btn-primary { width: 100%; margin-top: 20px; padding: 14px; background: linear-gradient(135deg, #ff6b00, #ff9500); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* ‚îÄ‚îÄ Header ‚îÄ‚îÄ */
.header { background: #0d1220; border-bottom: 1px solid #1e2d4a; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.header-title { font-size: 1.1rem; font-weight: 800; background: linear-gradient(135deg, #ff6b00, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-actions { display: flex; gap: 8px; }
.btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid #1e2d4a; background: #131929; color: #7a8aaa; transition: all 0.2s; }
.btn-sm:hover { background: #1e2d4a; color: #e0e6ff; }
.btn-sm.active { background: #ff6b00; border-color: #ff6b00; color: #fff; }
.btn-sm.results-active { background: #16a34a; border-color: #16a34a; color: #fff; }
.btn-sm.score-btn { background: #2563eb; border-color: #2563eb; color: #fff; }

/* ‚îÄ‚îÄ Player Tabs ‚îÄ‚îÄ */
.player-tabs { display: flex; gap: 4px; padding: 8px 0; overflow-x: auto; }
.player-tab { padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid #1e2d4a; background: transparent; color: #7a8aaa; white-space: nowrap; transition: all 0.2s; }
.player-tab:hover { border-color: #3a4a6a; color: #c0cce8; }
.player-tab.active { background: #1e3a6e; border-color: #2563eb; color: #60a5fa; }
.player-tab.results-tab { }
.player-tab.results-tab.active { background: #14532d; border-color: #16a34a; color: #4ade80; }

/* ‚îÄ‚îÄ Region Nav ‚îÄ‚îÄ */
.region-nav { display: flex; gap: 4px; padding: 8px 16px; overflow-x: auto; background: #0a0e1a; border-bottom: 1px solid #1e2d4a; }
.region-tab { padding: 6px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; background: transparent; color: #7a8aaa; white-space: nowrap; transition: all 0.2s; }
.region-tab:hover { color: #c0cce8; background: #131929; }
.region-tab.active { background: #1e2d4a; border-color: #2563eb; color: #60a5fa; }

/* ‚îÄ‚îÄ Main Content ‚îÄ‚îÄ */
.main-content { padding: 16px; overflow-x: auto; }

/* ‚îÄ‚îÄ Bracket Layout ‚îÄ‚îÄ */
.bracket-region { display: flex; gap: 0; align-items: flex-start; }
.bracket-region.mirrored { flex-direction: row-reverse; }
.round-col { display: flex; flex-direction: column; }
.round-label { font-size: 0.65rem; font-weight: 700; color: #3a4a6a; text-align: center; padding: 4px 8px; letter-spacing: 0.05em; text-transform: uppercase; }

/* ‚îÄ‚îÄ Lock Controls ‚îÄ‚îÄ */
.lock-btn { display: block; margin: 0 auto 4px; padding: 2px 7px; font-size: 0.58rem; font-weight: 700; border: 1px solid #3a4a6a; border-radius: 4px; background: #131929; color: #7a8aaa; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.lock-btn:hover { background: #1e2d4a; color: #facc15; border-color: #facc15; }
.locked-badge { display: block; text-align: center; font-size: 0.6rem; color: #facc15; font-weight: 700; padding: 2px 0 4px; letter-spacing: 0.03em; }

/* ‚îÄ‚îÄ Game Wrapper (controls spacing) ‚îÄ‚îÄ */
.game-wrapper { display: flex; align-items: center; justify-content: center; position: relative; }
.game-wrapper.r64 { min-height: 64px; height: 64px; }
.game-wrapper.r32 { min-height: 128px; height: 128px; }
.game-wrapper.r16 { min-height: 256px; height: 256px; }
.game-wrapper.r8  { min-height: 512px; height: 512px; }
.game-wrapper.rf4 { min-height: 150px; height: 150px; }
.game-wrapper.rc  { min-height: 80px; height: 80px; }

/* ‚îÄ‚îÄ Connector Lines ‚îÄ‚îÄ */
.connector-col { display: flex; flex-direction: column; width: 16px; }
.connector-pair { display: flex; flex-direction: column; }
.connector-pair.r64 { height: 128px; }
.connector-pair.r32 { height: 256px; }
.connector-pair.r16 { height: 512px; }
.connector-top { flex: 1; border-right: 2px solid #1e2d4a; border-bottom: 2px solid #1e2d4a; }
.connector-bottom { flex: 1; border-right: 2px solid #1e2d4a; border-top: 2px solid #1e2d4a; }
.connector-arm { width: 16px; height: 2px; background: #1e2d4a; align-self: center; }

/* ‚îÄ‚îÄ Game Card ‚îÄ‚îÄ */
.game-card { width: 154px; border: 1px solid #1e2d4a; border-radius: 6px; overflow: hidden; background: #0d1523; flex-shrink: 0; }
.game-card.ff-card { width: 154px; }
.game-card.locked-card { border-color: #facc1540; }

.team-slot { display: flex; align-items: center; padding: 5px 8px; gap: 6px; cursor: pointer; transition: background 0.15s; min-height: 28px; position: relative; }
.team-slot:hover:not(.disabled):not(.tbd):not(.locked-slot) { background: #1e2d4a; }
.team-slot.selected-pick { background: #1e3a6e !important; }
.team-slot.selected-result { background: #14532d !important; }
.team-slot.eliminated { opacity: 0.35; }
.team-slot.tbd { cursor: default; opacity: 0.5; }
.team-slot.disabled { cursor: default; }
.team-slot.locked-slot { cursor: not-allowed; }

.team-slot + .team-slot { border-top: 1px solid #1e2d4a; }

.seed-badge { font-size: 0.6rem; font-weight: 700; color: #7a8aaa; width: 16px; text-align: right; flex-shrink: 0; }
.team-name { font-size: 0.72rem; font-weight: 500; color: #c0cce8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.team-slot.selected-pick .team-name { color: #60a5fa; font-weight: 700; }
.team-slot.selected-result .team-name { color: #4ade80; font-weight: 700; }
.check-icon { font-size: 0.65rem; color: #4ade80; flex-shrink: 0; }
.correct-icon { font-size: 0.65rem; color: #facc15; flex-shrink: 0; }
.lock-icon-sm { font-size: 0.5rem; color: #facc1555; flex-shrink: 0; }

/* ‚îÄ‚îÄ First Four ‚îÄ‚îÄ */
.first-four-section { margin-bottom: 24px; }
.first-four-title { font-size: 0.7rem; font-weight: 700; color: #ff6b00; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.first-four-grid { display: flex; gap: 12px; flex-wrap: wrap; }
.ff-group { display: flex; flex-direction: column; gap: 4px; }
.ff-label { font-size: 0.6rem; color: #3a4a6a; }
.ff-feeds { font-size: 0.55rem; color: #ff6b00; opacity: 0.7; }

/* ‚îÄ‚îÄ Final Four ‚îÄ‚îÄ */
.final-four-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.f4-layout { display: flex; align-items: center; gap: 32px; }
.f4-side { display: flex; flex-direction: column; gap: 8px; }
.f4-label { font-size: 0.65rem; font-weight: 700; color: #ff6b00; text-align: center; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.champ-label { font-size: 0.75rem; font-weight: 800; color: #facc15; text-align: center; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.champ-card { width: 180px; }
.trophy { font-size: 2rem; text-align: center; margin-bottom: 8px; }
.vs-divider { font-size: 0.7rem; color: #3a4a6a; font-weight: 700; }

/* ‚îÄ‚îÄ Scoreboard ‚îÄ‚îÄ */
.scoreboard-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.scoreboard-card { background: #131929; border: 1px solid #1e2d4a; border-radius: 16px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
.score-title { font-size: 1.3rem; font-weight: 800; color: #facc15; margin-bottom: 4px; }
.score-sub { font-size: 0.75rem; color: #7a8aaa; margin-bottom: 20px; }
.score-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; background: #0d1523; margin-bottom: 8px; border: 1px solid #1e2d4a; }
.score-rank { font-size: 1.1rem; font-weight: 800; color: #7a8aaa; width: 24px; text-align: center; }
.score-rank.gold { color: #facc15; }
.score-rank.silver { color: #94a3b8; }
.score-rank.bronze { color: #f97316; }
.score-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
.score-total { font-size: 1.3rem; font-weight: 800; }
.score-total.pos { color: #4ade80; }
.score-total.neg { color: #f87171; }
.score-total.zero { color: #7a8aaa; }
.score-breakdown { font-size: 0.68rem; color: #7a8aaa; line-height: 1.6; margin-top: 4px; }
.score-possible { font-size: 0.68rem; color: #3a4a6a; }
.btn-close { display: block; width: 100%; margin-top: 16px; padding: 10px; background: #1e2d4a; border: 1px solid #2a3d5a; border-radius: 8px; color: #e0e6ff; font-weight: 600; cursor: pointer; }
.score-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-bottom: 14px; }
.score-legend-item { font-size: 0.68rem; color: #7a8aaa; }

/* ‚îÄ‚îÄ Region Header ‚îÄ‚îÄ */
.region-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.region-name-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.east-badge { background: #1e3a6e; color: #60a5fa; }
.west-badge { background: #3b1f60; color: #c084fc; }
.midwest-badge { background: #1f3a2a; color: #4ade80; }
.south-badge { background: #3a1f1f; color: #f87171; }
.champion-name { font-size: 0.7rem; color: #7a8aaa; }

/* ‚îÄ‚îÄ Progress Bar ‚îÄ‚îÄ */
.progress-bar { height: 2px; background: #1e2d4a; border-radius: 1px; margin-bottom: 2px; }
.progress-fill { height: 100%; border-radius: 1px; background: linear-gradient(90deg, #2563eb, #60a5fa); transition: width 0.3s; }

/* ‚îÄ‚îÄ Misc ‚îÄ‚îÄ */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: #3a4a6a; gap: 12px; }
.round-section-label { font-size: 0.62rem; font-weight: 700; color: #3a4a6a; text-align: center; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

/* ‚îÄ‚îÄ Mobile Responsive ‚îÄ‚îÄ */
@media (max-width: 480px) {
  /* Header */
  .header { padding: 0 10px; }
  .header-top { padding: 7px 0; }
  .header-title { font-size: 0.85rem; }
  .btn-sm { padding: 5px 9px; font-size: 0.72rem; }

  /* Player tabs */
  .player-tab { padding: 5px 10px; font-size: 0.72rem; }
  .player-tabs { gap: 3px; }

  /* Region nav */
  .region-nav { padding: 6px 10px; gap: 3px; }
  .region-tab { padding: 5px 10px; font-size: 0.72rem; }

  /* Main content */
  .main-content { padding: 10px; }

  /* Bracket game cards ‚Äî narrower on mobile */
  .game-card { width: 128px; }
  .team-name { font-size: 0.66rem; }
  .seed-badge { font-size: 0.55rem; width: 13px; }
  .team-slot { padding: 4px 6px; min-height: 24px; gap: 4px; }

  /* Game wrapper heights shrink proportionally */
  .game-wrapper.r64 { min-height: 54px; height: 54px; }
  .game-wrapper.r32 { min-height: 108px; height: 108px; }
  .game-wrapper.r16 { min-height: 216px; height: 216px; }
  .game-wrapper.r8  { min-height: 432px; height: 432px; }

  /* Connector sizing */
  .connector-pair.r64 { height: 108px; }
  .connector-pair.r32 { height: 216px; }
  .connector-pair.r16 { height: 432px; }

  /* First Four grid ‚Äî 1 column on very small screens */
  .first-four-grid { flex-direction: column; gap: 16px; }

  /* Scoreboard */
  .scoreboard-card { padding: 18px; }
  .score-legend { grid-template-columns: 1fr; }

  /* Overview */
  .overview-table { font-size: 0.65rem; }
  .overview-table th, .overview-table td { padding: 4px 7px; }
  .ov-game-col { min-width: 110px; }
  .ov-player-col, .ov-result-col { min-width: 75px; }
  .ov-team { font-size: 0.62rem; }

  /* Setup card */
  .setup-card { padding: 24px 18px; }
  .setup-title { font-size: 1.5rem; }
}

/* ‚îÄ‚îÄ Overview ‚îÄ‚îÄ */
.overview-container { display: flex; flex-direction: column; gap: 20px; }
.overview-round { background: #0d1523; border: 1px solid #1e2d4a; border-radius: 10px; overflow: hidden; }
.overview-round-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 14px; background: #131929; color: #facc15; border-bottom: 1px solid #1e2d4a; display: flex; align-items: center; gap: 8px; }
.overview-round-meta { font-size: 0.62rem; color: #7a8aaa; font-weight: 400; text-transform: none; letter-spacing: 0; }
.overview-table-wrap { overflow-x: auto; }
.overview-table { width: 100%; border-collapse: collapse; font-size: 0.71rem; }
.overview-table th { padding: 5px 10px; text-align: left; font-size: 0.62rem; font-weight: 700; color: #7a8aaa; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid #1e2d4a; background: #0a0e1a; white-space: nowrap; }
.overview-table td { padding: 4px 10px; border-bottom: 1px solid #1e2d4a1a; vertical-align: middle; }
.overview-table tr:last-child td { border-bottom: none; }
.overview-table tr:hover td { background: #ffffff06; }
.ov-game-col { min-width: 150px; }
.ov-player-col { min-width: 95px; white-space: nowrap; }
.ov-result-col { min-width: 95px; white-space: nowrap; }
.ov-teams { display: flex; flex-direction: column; gap: 0; line-height: 1.35; }
.ov-team { color: #c0cce8; font-size: 0.67rem; }
.ov-seed { color: #7a8aaa; font-size: 0.58rem; margin-right: 2px; }
.ov-vs { font-size: 0.5rem; color: #3a4a6a; margin: 0 0; }
.ov-correct-cell { background: #14532d30 !important; }
.ov-wrong-cell { background: #450a0a30 !important; }
.ov-pick-name { font-weight: 500; }
.ov-pick-correct { color: #4ade80; font-weight: 700; }
.ov-pick-wrong { color: #f87171; }
.ov-pick-seed { color: #7a8aaa; font-size: 0.6rem; margin-right: 2px; }
.ov-dollar { font-size: 0.6rem; margin-left: 3px; }
.ov-dollar-pos { color: #4ade80; }
.ov-dollar-neg { color: #f87171; }
.ov-summary-row td { background: #131929; font-weight: 700; font-size: 0.72rem; border-top: 1px solid #1e2d4a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
// BRACKET DATA
// ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

const ALL_GAMES = {};

function addGame(id, round, config) {
  ALL_GAMES[id] = { id, round, ...config };
}

// First Four
addGame('ff1', 0, { top: { id:'umbc', name:'UMBC', seed:16 }, bottom: { id:'howard', name:'Howard', seed:16 }, label:'Midwest 16-seed play-in', feederTo:'mw-64-1', feederSlot:'bottom' });
addGame('ff2', 0, { top: { id:'pv', name:'Prairie View', seed:16 }, bottom: { id:'lehigh', name:'Lehigh', seed:16 }, label:'South 16-seed play-in', feederTo:'s-64-1', feederSlot:'bottom' });
addGame('ff3', 0, { top: { id:'texas', name:'Texas', seed:11 }, bottom: { id:'ncst', name:'NC State', seed:11 }, label:'West 11-seed play-in', feederTo:'w-64-5', feederSlot:'bottom' });
addGame('ff4', 0, { top: { id:'smu', name:'SMU', seed:11 }, bottom: { id:'miaoh', name:'Miami (OH)', seed:11 }, label:'Midwest 11-seed play-in', feederTo:'mw-64-5', feederSlot:'bottom' });

// ‚îÄ‚îÄ EAST REGION ‚îÄ‚îÄ
addGame('e-64-1', 1, { top:{id:'duke',name:'Duke',seed:1}, bottom:{id:'siena',name:'Siena',seed:16} });
addGame('e-64-2', 1, { top:{id:'ohiost',name:'Ohio St.',seed:8}, bottom:{id:'tcu',name:'TCU',seed:9} });
addGame('e-64-3', 1, { top:{id:'stjohns',name:"St. John's",seed:5}, bottom:{id:'uni',name:'N. Iowa',seed:12} });
addGame('e-64-4', 1, { top:{id:'kansas',name:'Kansas',seed:4}, bottom:{id:'calbap',name:'Cal Baptist',seed:13} });
addGame('e-64-5', 1, { top:{id:'louisville',name:'Louisville',seed:6}, bottom:{id:'soufla',name:'South Florida',seed:11} });
addGame('e-64-6', 1, { top:{id:'michst',name:'Michigan St.',seed:3}, bottom:{id:'ndsu',name:'N. Dakota St.',seed:14} });
addGame('e-64-7', 1, { top:{id:'ucla',name:'UCLA',seed:7}, bottom:{id:'ucf',name:'UCF',seed:10} });
addGame('e-64-8', 1, { top:{id:'uconn',name:'UConn',seed:2}, bottom:{id:'furman',name:'Furman',seed:15} });
addGame('e-32-1', 2, { topFrom:'e-64-1', bottomFrom:'e-64-2' });
addGame('e-32-2', 2, { topFrom:'e-64-3', bottomFrom:'e-64-4' });
addGame('e-32-3', 2, { topFrom:'e-64-5', bottomFrom:'e-64-6' });
addGame('e-32-4', 2, { topFrom:'e-64-7', bottomFrom:'e-64-8' });
addGame('e-16-1', 3, { topFrom:'e-32-1', bottomFrom:'e-32-2' });
addGame('e-16-2', 3, { topFrom:'e-32-3', bottomFrom:'e-32-4' });
addGame('e-8',   4, { topFrom:'e-16-1', bottomFrom:'e-16-2' });

// ‚îÄ‚îÄ WEST REGION ‚îÄ‚îÄ
addGame('w-64-1', 1, { top:{id:'arizona',name:'Arizona',seed:1}, bottom:{id:'liu',name:'LIU',seed:16} });
addGame('w-64-2', 1, { top:{id:'villanova',name:'Villanova',seed:8}, bottom:{id:'utahst',name:'Utah St.',seed:9} });
addGame('w-64-3', 1, { top:{id:'wisconsin',name:'Wisconsin',seed:5}, bottom:{id:'highpoint',name:'High Point',seed:12} });
addGame('w-64-4', 1, { top:{id:'arkansas',name:'Arkansas',seed:4}, bottom:{id:'hawaii',name:'Hawaii',seed:13} });
addGame('w-64-5', 1, { top:{id:'byu',name:'BYU',seed:6}, bottomFrom:'ff3' });
addGame('w-64-6', 1, { top:{id:'gonzaga',name:'Gonzaga',seed:3}, bottom:{id:'kennesaw',name:'Kennesaw St.',seed:14} });

// Money scoring: correct / wrong penalty per round
const MONEY_CORRECT = { 0:1,  1:1,  2:1,  3:5,  4:5,  5:10, 6:50 };
const MONEY_WRONG   = { 0:2,  1:2,  2:2,  3:10, 4:10, 5:10, 6:0  };

// ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

// ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
function getTeamForSlot(gameId, slot, picks) {
  const game = ALL_GAMES[gameId];
  if (!game) return null;
  const direct = game[slot];
  if (direct) return direct;
  const fromId = game[slot + 'From'];
  if (!fromId) return null;
  const winnerId = picks[fromId];
  if (!winnerId) return null;
  const topTeam = getTeamForSlot(fromId, 'top', picks);
  const bottomTeam = getTeamForSlot(fromId, 'bottom', picks);
  if (topTeam && topTeam.id === winnerId) return topTeam;
  if (bottomTeam && bottomTeam.id === winnerId) return bottomTeam;
  return null;
}

function getWinner(gameId, picks) {
  if (!picks[gameId]) return null;
  const winnerId = picks[gameId];
  const topTeam = getTeamForSlot(gameId, 'top', picks);
  const bottomTeam = getTeamForSlot(gameId, 'bottom', picks);
  if (topTeam && topTeam.id === winnerId) return topTeam;
  if (bottomTeam && bottomTeam.id === winnerId) return bottomTeam;
  return null;
}

function calcScore(playerPicks, results) {
  let total = 0;
  const byRound = {};
  Object.keys(ALL_GAMES).forEach(gameId => {
    const game = ALL_GAMES[gameId];
    const resultId = results[gameId];
    const pickId   = playerPicks[gameId];
    if (!resultId || !pickId) return;
    const r = game.round;
    if (!byRound[r]) byRound[r] = { correct:0, wrong:0, net:0 };
    if (resultId === pickId) {
      const pts = MONEY_CORRECT[r] || 1;
      total += pts;
      byRound[r].correct++;
      byRound[r].net += pts;
    } else {
      const pts = MONEY_WRONG[r] || 2;
      total -= pts;
      byRound[r].wrong++;
      byRound[r].net -= pts;
    }
  });
  return { total, byRound };
}

function formatMoney(n) {
  if (n === 0) return '$0';
  return n > 0 ? `+$${n}` : `-$${Math.abs(n)}`;
}

function countPicks(picks) {
  return Object.keys(picks).length;
}

function totalPossiblePicks() {
  return Object.keys(ALL_GAMES).length;
}

function TeamSlot({ team, isSelected, isEliminated, isTbd, onPick, mode, isCorrect, locked }) {
  const cls = ['team-slot'];
  if (isTbd) cls.push('tbd');
  else if (isSelected && mode === 'picks') cls.push('selected-pick');
  else if (isSelected && mode === 'results') cls.push('selected-result');
  if (isEliminated) cls.push('eliminated');
  if (!team || isTbd) cls.push('disabled');
  if (locked && team && !isTbd) cls.push('locked-slot');

  const handleClick = (!isTbd && team && !locked) ? onPick : undefined;

  return (
    <div className={cls.join(' ')} onClick={handleClick}>
      {team ? (
        <>
          <span className="seed-badge">{team.seed}</span>
          <span className="team-name">{team.name}</span>
          {isSelected && mode === 'results' && <span className="check-icon">‚úì</span>}
          {isCorrect && mode === 'picks' && <span className="correct-icon">‚òÖ</span>}
          {locked && isSelected && <span className="lock-icon-sm">üîí</span>}
        </>
      ) : (
        <>

          <span className="team-name" style={{color:'#3a4a6a',fontStyle:'italic'}}>TBD</span>
        </>
      )}
    </div>
  );
}

function GameCard({ gameId, picks, onPick, mode, results, cardStyle, locked }) {
  const game = ALL_GAMES[gameId];
  if (!game) return null;

  const topTeam    = getTeamForSlot(gameId, 'top', picks);
  const bottomTeam = getTeamForSlot(gameId, 'bottom', picks);
  const winnerId   = picks[gameId];
  const resultId   = results[gameId];

  const topSelected    = winnerId === topTeam?.id;
  const bottomSelected = winnerId === bottomTeam?.id;
  const topElim        = !topSelected && !!winnerId;
  const bottomElim     = !bottomSelected && !!winnerId;
  const topCorrect     = mode === 'picks' && resultId && resultId === topTeam?.id && topSelected;
  const bottomCorrect  = mode === 'picks' && resultId && resultId === bottomTeam?.id && bottomSelected;

  const topTbd    = !topTeam && !game.top;
  const bottomTbd = !bottomTeam && !game.bottom;

  const cardCls = ['game-card'];
  if (locked) cardCls.push('locked-card');

  return (
    <div className={cardCls.join(' ')} style={cardStyle}>
      <TeamSlot
        team={topTeam}
        isSelected={topSelected}
        isEliminated={topElim}
        isTbd={topTbd}
        mode={mode}
        isCorrect={topCorrect}
        locked={locked}
        onPick={() => topTeam && onPick(gameId, topTeam.id)}
      />
      <TeamSlot
        team={bottomTeam}
        isSelected={bottomSelected}
        isEliminated={bottomElim}
        isTbd={bottomTbd}
        mode={mode}
        isCorrect={bottomCorrect}
        locked={locked}
        onPick={() => bottomTeam && onPick(gameId, bottomTeam.id)}
      />
    </div>
  );
}

// ‚îÄ‚îÄ OVERALL VIEW ‚îÄ‚îÄ
function OverallView({ players, allPicks, results }) {
  const ROUND_ORDER = [0, 1, 2, 3, 4, 5, 6];

  return (
    <div className="overview-container">
      {ROUND_ORDER.map(roundNum => {
        const gamesInRound = Object.values(ALL_GAMES).filter(g => g.round === roundNum);
        if (gamesInRound.length === 0) return null;

        // Calculate round totals per player
        const roundTotals = players.map((_, pi) => {
          let net = 0;
          gamesInRound.forEach(game => {
            const resultId = results[game.id];
            const pickId   = allPicks[pi]?.[game.id];
            if (!resultId || !pickId) return;
            if (resultId === pickId) net += (MONEY_CORRECT[roundNum] || 1);
            else net -= (MONEY_WRONG[roundNum] || 2);
          });
          return net;
        });

        return (
          <div key={roundNum} className="overview-round">
            <div className="overview-round-title">
              {ROUND_LABELS[roundNum]}
              <span className="overview-round-meta">
                ¬∑ {gamesInRound.length} game{gamesInRound.length > 1 ? 's' : ''}
                ¬∑ correct: +${MONEY_CORRECT[roundNum]} / wrong: -${MONEY_WRONG[roundNum]}
                {roundNum === 6 ? ' bonus' : ''}
              </span>
            </div>
            <div className="overview-table-wrap">
              <table className="overview-table">
                <thead>
                  <tr>
                    <th className="ov-game-col">Game</th>
                    {players.map((p, i) => <th key={i} className="ov-player-col">{p}</th>)}
                    <th className="ov-result-col">Actual Result</th>
                  </tr>
                </thead>
                <tbody>
                  {gamesInRound.map(game => {
                    const resultId = results[game.id];
                    // Resolve teams using results for "actual" display
                    const topActual    = getTeamForSlot(game.id, 'top', results);
                    const bottomActual = getTeamForSlot(game.id, 'bottom', results);
                    const resultTeam   = resultId
                      ? (topActual?.id === resultId ? topActual : bottomActual?.id === resultId ? bottomActual : null)
                      : null;

                    return (
                      <tr key={game.id}>
                        <td className="ov-game-col">
                          <div className="ov-teams">
                            <span className="ov-team">
                              {topActual
                                ? <><span className="ov-seed">{topActual.seed}</span>{topActual.name}</>
                                : <span style={{color:'#3a4a6a',fontStyle:'italic'}}>TBD</span>}
                            </span>
                            <span className="ov-vs">vs</span>
                            <span className="ov-team">
                              {bottomActual
                                ? <><span className="ov-seed">{bottomActual.seed}</span>{bottomActual.name}</>
                                : <span style={{color:'#3a4a6a',fontStyle:'italic'}}>TBD</span>}
                            </span>
                          </div>
                        </td>
                        {players.map((p, pi) => {
                          const pickId = allPicks[pi]?.[game.id];
                          // Resolve pick team using player's own picks for context
                          const pTop    = getTeamForSlot(game.id, 'top', allPicks[pi] || {});
                          const pBottom = getTeamForSlot(game.id, 'bottom', allPicks[pi] || {});
                          const pickedTeam = pickId
                            ? (pTop?.id === pickId ? pTop : pBottom?.id === pickId ? pBottom : null)
                            : null;
                          const correct = !!(resultId && pickId && resultId === pickId);
                          const wrong   = !!(resultId && pickId && resultId !== pickId);
                          const dollarAmt = correct
                            ? (MONEY_CORRECT[roundNum] || 1)
                            : wrong ? -(MONEY_WRONG[roundNum] || 2) : 0;

                          return (
                            <td key={pi} className={`ov-player-col ${correct ? 'ov-correct-cell' : wrong ? 'ov-wrong-cell' : ''}`}>
                              {pickedTeam ? (
                                <>
                                  <span className="ov-pick-seed">{pickedTeam.seed}</span>
                                  <span className={`ov-pick-name ${correct ? 'ov-pick-correct' : wrong ? 'ov-pick-wrong' : ''}`}>
                                    {pickedTeam.name}
                                  </span>
                                  {correct && <span className="ov-dollar ov-dollar-pos">+${dollarAmt} ‚úì</span>}
                                  {wrong && <span className="ov-dollar ov-dollar-neg">-${Math.abs(dollarAmt)} ‚úó</span>}
                                </>
                              ) : <span style={{color:'#3a4a6a'}}>‚Äî</span>}
                            </td>
                          );
                        })}
                        <td className="ov-result-col">
                          {resultTeam
                            ? <span style={{color:'#4ade80', fontWeight:700}}>
                                <span style={{color:'#7a8aaa',fontSize:'0.6rem',marginRight:2}}>{resultTeam.seed}</span>
                                {resultTeam.name}
                              </span>
                            : <span style={{color:'#3a4a6a'}}>‚Äî</span>}
                        </td>
                      </tr>
                    );
                  })}
                  {/* Round totals row */}
                  <tr className="ov-summary-row">
                    <td style={{color:'#7a8aaa',fontSize:'0.65rem'}}>Round total</td>
                    {roundTotals.map((net, i) => (
                      <td key={i} style={{color: net > 0 ? '#4ade80' : net < 0 ? '#f87171' : '#7a8aaa', fontSize:'0.72rem'}}>
                        {net !== 0 ? formatMoney(net) : '‚Äî'}
                      </td>
                    ))}
                    <td></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        );
      })}

      {/* Grand totals */}
      <div style={{background:'#131929', border:'1px solid #facc1540', borderRadius:10, padding:'14px 16px'}}>
        <div style={{fontSize:'0.75rem', fontWeight:800, color:'#facc15', marginBottom:10, textTransform:'uppercase', letterSpacing:'0.06em'}}>
          üí∞ Overall Standings
        </div>
        <div style={{display:'flex', gap:16, flexWrap:'wrap'}}>
          {players.map((name, i) => {
            const { total } = calcScore(allPicks[i] || {}, results);
            return (
              <div key={i} style={{background:'#0d1523', border:'1px solid #1e2d4a', borderRadius:8, padding:'8px 14px', minWidth:100}}>
                <div style={{fontSize:'0.7rem', color:'#7a8aaa', marginBottom:2}}>{name}</div>
                <div style={{fontSize:'1.2rem', fontWeight:800, color: total > 0 ? '#4ade80' : total < 0 ? '#f87171' : '#7a8aaa'}}>
                  {formatMoney(total)}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ‚îÄ‚îÄ SCOREBOARD ‚îÄ‚îÄ
function Scoreboard({ players, allPicks, results, onClose }) {
  const scores = players.map((name, i) => {
    const { total, byRound } = calcScore(allPicks[i] || {}, results);
    const picked = countPicks(allPicks[i] || {});
    return { name, total, byRound, picked };
  }).sort((a,b) => b.total - a.total);

  const rankEmojis  = ['ü•á','ü•à','ü•â'];
  const rankClasses = ['gold','silver','bronze'];

  return (
    <div className="scoreboard-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="scoreboard-card">
        <div className="score-title">üí∞ Scoreboard</div>
        <div className="score-sub">Dollar amounts based on actual results entered</div>
        <div className="score-legend">
          {Object.entries(MONEY_CORRECT).map(([r, pts]) => (
            <span key={r} className="score-legend-item">
              {ROUND_SHORT[r]}: +${pts} / -{MONEY_WRONG[r] > 0 ? '$'+MONEY_WRONG[r] : '$0'}
            </span>
          ))}
        </div>
        {scores.map((s, i) => {
          const rankCls = i < 3 ? rankClasses[i] : '';
          const totalCls = s.total > 0 ? 'pos' : s.total < 0 ? 'neg' : 'zero';
          return (
            <div key={s.name} className="score-row">
              <div className={`score-rank ${rankCls}`}>{i < 3 ? rankEmojis[i] : (i+1)}</div>
              <div style={{flex:1}}>
                <div className="score-name">{s.name}</div>
                <div className="score-breakdown">
                  {Object.entries(s.byRound).length > 0
                    ? Object.entries(s.byRound).map(([r, d]) =>
                        `${ROUND_SHORT[r]}: ${d.correct}‚úì ${d.wrong || 0}‚úó (${formatMoney(d.net)})`
                      ).join('  ¬∑  ')
                    : 'No results yet'}
                </div>
                <div className="score-possible">{s.picked} / {totalPossiblePicks()} picks made</div>
              </div>
              <div className={`score-total ${totalCls}`}>{formatMoney(s.total)}</div>
            </div>
          );
        })}
        <button className="btn-close" onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

// ‚îÄ‚îÄ SETUP SCREEN ‚îÄ‚îÄ
function SetupScreen({ onStart }) {
  const [names, setNames] = useState(['','','','','']);

  const activePlayers = names.filter(n => n.trim().length > 0);

  const handleStart = () => {
    const valid = names.map(n => n.trim()).filter(Boolean);
    if (valid.length > 0) onStart(valid);
  };

  return (
    <div className="setup-screen">
      <div className="setup-card">
        <div className="setup-title">üèÄ March Madness 2026</div>
        <div className="setup-sub">NCAA Tournament Bracket Challenge ¬∑ Up to 5 players</div>
        <div style={{fontSize:'0.75rem', color:'#7a8aaa', background:'#0d1523', border:'1px solid #1e2d4a', borderRadius:8, padding:'10px 14px', marginBottom:20, lineHeight:1.6}}>
          üí∞ <strong style={{color:'#e0e6ff'}}>Scoring:</strong> R64/R32 +$1/-$2 ¬∑ Sweet 16/E8 +$5/-$10 ¬∑ Final Four +$10/-$10 ¬∑ Champion +$50
        </div>

        {names.map((name, i) => (
          <div key={i} className={`player-row ${name.trim() ? 'active' : ''}`}>
            <div className="player-num">{i+1}</div>
            <input
              className="player-input"
              placeholder={`Player ${i+1} name${i === 0 ? ' (required)' : ' (optional)'}`}
              value={name}
              onChange={e => {
                const next = [...names];
                next[i] = e.target.value;
                setNames(next);
              }}
              onKeyDown={e => e.key === 'Enter' && handleStart()}
            />
          </div>
        ))}

        <button className="btn-primary" onClick={handleStart} disabled={activePlayers.length === 0}>
          Start Bracket Challenge ‚Üí
        </button>
      </div>
    </div>
  );
}

// ‚îÄ‚îÄ MAIN APP ‚îÄ‚îÄ
function App() {
  const [screen, setScreen] = useState('setup');
  const [players, setPlayers] = useState([]);
  const [activeTab, setActiveTab] = useState(0);
  const [activeRegion, setActiveRegion] = useState('firstfour');
  const [allPicks, setAllPicks] = useState([]);
  const [results, setResults] = useState({});
  const [showScore, setShowScore] = useState(false);
  const [lockedRounds, setLockedRounds] = useState([]); // Array<number[]> per player

  // Load from localStorage
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('mm2026') || 'null');
      if (saved && saved.players) {
        setPlayers(saved.players);
        setAllPicks(saved.allPicks || saved.players.map(() => ({})));
        setResults(saved.results || {});
        setLockedRounds(saved.lockedRounds || saved.players.map(() => []));
        setScreen('bracket');
      }
    } catch(e) {}
  }, []);

  // Save to localStorage
  useEffect(() => {
    if (screen === 'bracket') {
      localStorage.setItem('mm2026', JSON.stringify({ players, allPicks, results, lockedRounds }));
    }
  }, [players, allPicks, results, lockedRounds, screen]);

  const handleStart = (validPlayers) => {
    setPlayers(validPlayers);
    setAllPicks(validPlayers.map(() => ({})));
    setResults({});
    setLockedRounds(validPlayers.map(() => []));
    setActiveTab(0);
    setScreen('bracket');
  };

  const handleReset = () => {
    if (confirm('Reset all picks, results, and locks? This cannot be undone.')) {
      localStorage.removeItem('mm2026');
      setScreen('setup');
      setPlayers([]);
      setAllPicks([]);
      setResults({});
      setLockedRounds([]);
    }
  };

  const isResultsMode = activeTab === players.length;
  const isOverviewMode = activeTab === players.length + 1;

  const currentPicks = isResultsMode ? results : isOverviewMode ? {} : (allPicks[activeTab] || {});

  function clearDownstream(picksObj, changedGameId) {
    Object.keys(ALL_GAMES).forEach(gid => {
      const g = ALL_GAMES[gid];
      if (g.topFrom === changedGameId || g.bottomFrom === changedGameId) {
        const winnerId = picksObj[gid];
        if (winnerId) {
          const topTeam    = getTeamForSlot(gid, 'top', picksObj);
          const bottomTeam = getTeamForSlot(gid, 'bottom', picksObj);
          if ((!topTeam || topTeam.id !== winnerId) && (!bottomTeam || bottomTeam.id !== winnerId)) {
            delete picksObj[gid];
            clearDownstream(picksObj, gid);
          }
        }
      }
    });
  }

  const handlePick = useCallback((gameId, teamId) => {
    if (isOverviewMode) return;
    if (isResultsMode) {
      setResults(prev => {
        const next = { ...prev };
        if (next[gameId] === teamId) delete next[gameId];
        else next[gameId] = teamId;
        clearDownstream(next, gameId);
        return next;
      });
    } else {
      const pi = activeTab;
      // Check if this round is locked
      const roundNum = ALL_GAMES[gameId]?.round;
      if ((lockedRounds[pi] || []).includes(roundNum)) return;
      setAllPicks(prev => {
        const next = prev.map((p, i) => {
          if (i !== pi) return p;
          const updated = { ...p };
          if (updated[gameId] === teamId) delete updated[gameId];
          else updated[gameId] = teamId;
          clearDownstream(updated, gameId);
          return updated;
        });
        return next;
      });
    }
  }, [isResultsMode, isOverviewMode, activeTab, lockedRounds]);

  const handleLockRound = useCallback((roundNum) => {
    if (isResultsMode || isOverviewMode) return;
    const pi = activeTab;
    if (confirm(`Lock your ${ROUND_LABELS[roundNum]} picks? You won't be able to change them.`)) {
      setLockedRounds(prev => {
        const next = [...prev];
        if (!next[pi]) next[pi] = [];
        if (!next[pi].includes(roundNum)) {
          next[pi] = [...next[pi], roundNum];
        }
        return next;
      });
    }
  }, [isResultsMode, isOverviewMode, activeTab]);

  const regionTabs = [
    { key: 'firstfour',  label: '‚ö° First Four' },
    { key: 'east',       label: 'East' },
    { key: 'west',       label: 'West' },
    { key: 'midwest',    label: 'Midwest' },
    { key: 'south',      label: 'South' },
    { key: 'finalfour',  label: 'üèÜ Final Four' },
  ];

  const totalPicks = isResultsMode
    ? countPicks(results)
    : isOverviewMode ? 0
    : countPicks(allPicks[activeTab] || {});

  const pct = Math.round((totalPicks / totalPossiblePicks()) * 100);

  const playerLockedRounds = !isResultsMode && !isOverviewMode ? (lockedRounds[activeTab] || []) : [];

  if (screen === 'setup') return <SetupScreen onStart={handleStart} />;

  return (
    <div>
      {showScore && (
        <Scoreboard
          players={players}
          allPicks={allPicks}
          results={results}
          onClose={() => setShowScore(false)}
        />
      )}

      <div className="header">
        <div className="header-top">
          <div className="header-title">üèÄ March Madness 2026</div>
          <div className="header-actions">
            <button className="btn-sm score-btn" onClick={() => setShowScore(true)}>üí∞ Scores</button>
            <button className="btn-sm" onClick={handleReset}>‚Ü∫ Reset</button>
          </div>
        </div>

        <div className="player-tabs">
          {players.map((name, i) => {
            const { total } = calcScore(allPicks[i] || {}, results);
            const lockedCount = (lockedRounds[i] || []).length;
            return (
              <button
                key={i}
                className={`player-tab ${activeTab === i ? 'active' : ''}`}
                onClick={() => { setActiveTab(i); if (isOverviewMode || isResultsMode) setActiveRegion('firstfour'); }}
              >
                {name}
                {Object.keys(results).length > 0 && (
                  <span style={{marginLeft:5, fontSize:'0.7rem', color: total > 0 ? '#4ade80' : total < 0 ? '#f87171' : '#7a8aaa'}}>
                    {formatMoney(total)}
                  </span>
                )}
                {lockedCount > 0 && <span style={{marginLeft:4, fontSize:'0.6rem', color:'#facc15'}}>üîí{lockedCount}</span>}
              </button>
            );
          })}
          <button
            className={`player-tab results-tab ${isResultsMode ? 'active' : ''}`}
            onClick={() => { setActiveTab(players.length); if (isOverviewMode) setActiveRegion('firstfour'); }}
          >
            üìã Results
          </button>
          <button
            className={`player-tab ${isOverviewMode ? 'active' : ''}`}
            style={isOverviewMode ? {background:'#3b1f60', borderColor:'#7c3aed', color:'#c084fc'} : {}}
            onClick={() => setActiveTab(players.length + 1)}
          >
            üìä All Picks
          </button>
        </div>

        {!isOverviewMode && (
          <div style={{padding:'6px 0 8px', display:'flex', alignItems:'center', gap:10}}>
            <div className="progress-bar" style={{flex:1}}>
              <div className="progress-fill" style={{width: pct + '%'}} />
            </div>
            <span style={{fontSize:'0.65rem', color:'#7a8aaa', whiteSpace:'nowrap'}}>
              {isResultsMode ? 'Results' : players[activeTab]}: {totalPicks}/{totalPossiblePicks()} picks
            </span>
          </div>
        )}
      </div>

      {!isOverviewMode && (
        <div className="region-nav">
          {regionTabs.map(t => (
            <button
              key={t.key}
              className={`region-tab ${activeRegion === t.key ? 'active' : ''}`}
              onClick={() => setActiveRegion(t.key)}
            >
              {t.label}
            </button>
          ))}
        </div>
      )}

      <div className="main-content">
        {isOverviewMode ? (
          <OverallView players={players} allPicks={allPicks} results={results} />
        ) : (
          <>
            {activeRegion === 'firstfour' && (
              <FirstFourView
                picks={currentPicks}
                onPick={handlePick}
                mode={isResultsMode ? 'results' : 'picks'}
                results={results}
                playerLockedRounds={playerLockedRounds}
                onLockRound={handleLockRound}
              />
            )}
            {['east','west','midwest','south'].includes(activeRegion) && (
              <RegionBracket
                regionKey={activeRegion}
                picks={currentPicks}
                onPick={handlePick}
                mode={isResultsMode ? 'results' : 'picks'}
                results={results}
                playerLockedRounds={playerLockedRounds}
                onLockRound={handleLockRound}
              />
            )}
            {activeRegion === 'finalfour' && (
              <FinalFourView
                picks={currentPicks}
                onPick={handlePick}
                mode={isResultsMode ? 'results' : 'picks'}
                results={results}
                playerLockedRounds={playerLockedRounds}
                onLockRound={handleLockRound}
              />
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
